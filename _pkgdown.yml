url: https://stbl.wrangle.zone/
development:
  mode: auto
template:
  bootstrap: 5
lang: en-US

reference:
- title: character vectors
- contents:
  - matches("chr")
  - regex_must_match
- title: double vectors
- contents:
  - matches("dbl")
- title: factors
- contents:
  - matches("fct")
- title: integer vectors
- contents:
  - matches("int")
- title: logical vectors
- contents:
  - matches("lgl")
- title: data frames
- contents:
  - matches("df")
  - matches("data_frame")
- title: lists
- contents:
  - matches("lst")
  - stabilize_present
- title: generic args
- contents:
  - object_type
  - stabilize_arg
- title: conditions
- contents:
  - pkg_abort
  - expect_pkg_error_classes
  - expect_pkg_error_snapshot
  - pkg_warn
  - expect_pkg_warning_classes
  - expect_pkg_warning_snapshot
  - pkg_inform
  - expect_pkg_message_classes
  - expect_pkg_message_snapshot
